<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>注释动画方案</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:400,500,600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f4; font-family: 'JetBrains Mono', monospace; padding: 20px; color: #1c1917; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
  .card { background: #fff; border: 2px solid #e7e5e4; border-radius: 12px; overflow: hidden; }
  .card h2 { font-size: 12px; font-weight: 600; padding: 12px 16px; margin: 0; background: #fafaf8; border-bottom: 1px solid #e7e5e4; color: #1c1917; }
  .card h2 span { font-weight: 400; color: #78716c; font-size: 11px; margin-left: 8px; }
  .card-body { padding: 20px 16px; min-height: 160px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  pre { font-size: 14px; line-height: 1.9; color: #6A737D; background: transparent; }
  .line { display: block; opacity: 0; }
  .c1 { color: #6A737D; } .c2 { color: #22863a; } .c3 { color: #005cc5; }

  /* A: 逐字符打字 */
  @keyframes blink { 50% { opacity: 0; } }
  .cursor-a { display: inline; color: #2563eb; font-weight: 300; animation: blink 1s step-end infinite; }
  .line-a.typing { opacity: 1; }

  /* B: 滑入 + 注释符剥离 */
  .line-b { transform: translateX(-12px); transition: opacity 0.3s, transform 0.4s; }
  .line-b.show { opacity: 1; transform: translateX(0); }
  .slash-b { display: inline-block; transition: opacity 0.4s; }
  .slash-b.fade { opacity: 0; }

  /* C: 光标逐行写入 */
  .cursor-c { display: inline-block; color: #2563eb; animation: blink 1s step-end infinite; width: 8px; height: 18px; background: #2563eb; vertical-align: text-bottom; }
  .line-c.revealed { opacity: 1; }
  .cursor-c.hidden { display: none; }

  /* D: 墨水扩散 */
  .line-d { opacity: 0; filter: blur(2px); transition: opacity 0.6s, filter 0.6s; }
  .line-d.show { opacity: 1; filter: blur(0); }
</style>
</head>
<body>

<div class="grid">

<div class="card">
<h2>A <span>逐字符打字 + 光标</span></h2>
<div class="card-body"><pre id="demo-a"></pre></div>
</div>

<div class="card">
<h2>B <span>行滑入 + 剥离注释符</span></h2>
<div class="card-body"><pre id="demo-b"></pre></div>
</div>

<div class="card">
<h2>C <span>光标先行 · IDE 写入</span></h2>
<div class="card-body"><pre id="demo-c"></pre></div>
</div>

<div class="card">
<h2>D <span>墨水晕开</span></h2>
<div class="card-body"><pre id="demo-d"></pre></div>
</div>

</div>

<script>
// A: Character by character typewriter
(function() {
  var lines = ['/**', ' * 👋这里是, Muliminty 的个人站点 ', ' * 希望我们都能保持清醒,且有意义的生活😄', ' */'];
  var el = document.getElementById('demo-a');
  var lineIdx = 0, charIdx = 0;
  var cursor = null;
  function type() {
    if (lineIdx >= lines.length) { if (cursor) cursor.style.display = 'none'; return; }
    if (charIdx === 0) {
      var div = document.createElement('span'); div.className = 'line line-a typing'; el.appendChild(div);
      cursor = document.createElement('span'); cursor.className = 'cursor-a'; cursor.textContent = '|'; el.appendChild(cursor);
    }
    var lineEl = el.querySelectorAll('.line-a')[lineIdx];
    lineEl.textContent = lines[lineIdx].substring(0, charIdx + 1);
    charIdx++;
    if (charIdx >= lines[lineIdx].length) { lineIdx++; charIdx = 0; el.insertBefore(cursor, el.lastChild); }
    setTimeout(type, 30 + Math.random() * 50);
  }
  setTimeout(type, 300);
})();

// B: Slide in + slash strip
(function() {
  var lines = ['/**', ' * 👋这里是, Muliminty 的个人站点 ', ' * 希望我们都能保持清醒,且有意义的生活😄', ' */'];
  var el = document.getElementById('demo-b');
  lines.forEach(function(line, i) {
    var div = document.createElement('span'); div.className = 'line line-b';
    if (line.startsWith(' *')) {
      var slash = document.createElement('span'); slash.className = 'slash-b'; slash.textContent = '//';
      div.appendChild(slash);
      div.appendChild(document.createTextNode(' ' + line.replace(/^\s*\*\s?/, '')));
    } else {
      div.textContent = line;
    }
    el.appendChild(div);
    setTimeout(function() { div.classList.add('show'); }, 200 + i * 300);
  });
  // Fade out slashes after all shown
  setTimeout(function() {
    el.querySelectorAll('.slash-b').forEach(function(s) { s.classList.add('fade'); });
  }, 200 + lines.length * 300 + 600);
})();

// C: Cursor moves line by line (IDE writing feel)
(function() {
  var lines = ['/**', ' * 👋这里是, Muliminty 的个人站点 ', ' * 希望我们都能保持清醒,且有意义的生活😄', ' */'];
  var el = document.getElementById('demo-c');
  // First cursor line
  var cursorLine = document.createElement('span'); cursorLine.className = 'line line-c cursor-line';
  var cursor = document.createElement('span'); cursor.className = 'cursor-c'; cursorLine.appendChild(cursor);
  el.appendChild(cursorLine);

  var idx = 0;
  function writeNext() {
    if (idx >= lines.length) { cursor.classList.add('hidden'); return; }
    // Reveal current line below cursor
    var textLine = document.createElement('span'); textLine.className = 'line line-c'; textLine.textContent = lines[idx];
    textLine.style.opacity = '0';
    cursorLine.parentNode.insertBefore(textLine, cursorLine);
    setTimeout(function() { textLine.style.opacity = '1'; textLine.style.transition = 'opacity 0.2s'; }, 100);
    idx++;
    setTimeout(writeNext, 250);
  }
  setTimeout(writeNext, 400);
})();

// D: Ink bleed
(function() {
  var lines = ['/**', ' * 👋这里是, Muliminty 的个人站点 ', ' * 希望我们都能保持清醒,且有意义的生活😄', ' */'];
  var el = document.getElementById('demo-d');
  lines.forEach(function(line, i) {
    var div = document.createElement('span'); div.className = 'line line-d'; div.textContent = line;
    el.appendChild(div);
    setTimeout(function() { div.classList.add('show'); }, 100 + i * 200);
  });
})();
</script>
</body>
</html>
