<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C · 幕布扫描</title>
<style>
  :root {
    --bg: #fafaf8; --text: #1c1917; --text-muted: #78716c;
    --border: #e7e5e4; --accent: #2563eb;
    --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans); background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 32px; overflow: hidden;
    transition: color 0.3s;
  }
  body::before {
    content: ''; position: fixed; inset: -10px; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle at center, rgba(0,0,0,0.09) 1.5px, transparent 1.5px);
    background-size: 16px 16px;
  }

  /* 百叶窗层 */
  .curtain-layer {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    display: flex; flex-direction: column;
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .curtain-layer.open { clip-path: inset(0 0 0 0); }
  .curtain-layer.closing { clip-path: inset(0 100% 0 0); }

  .curtain-slat {
    flex: 1;
    background: #1c1917;
  }

  .content { position: relative; z-index: 20; text-align: center; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; margin-bottom: 32px; color: var(--text-muted); }

  .toggle-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1.5px solid var(--border); background: #fff;
    font-size: 24px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
    position: relative; z-index: 30;
  }
  .toggle-btn:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  body.dark { background: #1c1917; color: #e7e5e4; }
  body.dark::before {
    background-image: radial-gradient(circle at center, rgba(255,255,255,0.04) 1.5px, transparent 1.5px);
  }
  body.dark p { color: #a8a29e; }
  body.dark .toggle-btn { background: #292524; border-color: #44403c; }

  .hint { font-size: 11px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="curtain-layer" id="curtain"></div>

  <div class="content">
    <h1>Hello World</h1>
    <p>点击按钮看幕布扫描效果</p>
    <button class="toggle-btn" id="toggle" title="切换主题">☀️</button>
    <div class="hint">暗色幕布从左扫到右展开 ← → 反向收缩</div>
  </div>

<script>
  var container = document.getElementById('curtain');
  var N = 8;
  for (var i = 0; i < N; i++) {
    var slat = document.createElement('div');
    slat.className = 'curtain-slat';
    slat.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
    slat.style.transform = 'scaleX(0)';
    slat.style.transformOrigin = 'left';
    slat.style.transitionDelay = (i * 0.05) + 's';
    container.appendChild(slat);
  }

  var btn = document.getElementById('toggle');
  var isDark = false;

  btn.addEventListener('click', function() {
    isDark = !isDark;
    var slats = container.querySelectorAll('.curtain-slat');

    if (isDark) {
      // 亮→暗：slat 从左到右依次展开
      container.classList.add('open');
      container.classList.remove('closing');
      slats.forEach(function(s) { s.style.transform = 'scaleX(1)'; });

      var lastSlat = slats[slats.length - 1];
      lastSlat.addEventListener('transitionend', function handler() {
        lastSlat.removeEventListener('transitionend', handler);
        document.body.classList.add('dark');
        btn.textContent = '🌙';
      });
    } else {
      // 暗→亮：先切 body，然后 slat 从左到右依次收缩（反向动画）
      document.body.classList.remove('dark');
      btn.textContent = '☀️';
      slats.forEach(function(s) { s.style.transform = 'scaleX(0)'; });
    }
  });
</script>
</body>
</html>
