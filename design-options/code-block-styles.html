<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码块风格 — 个人卡片设计选项</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:400,500,600,700&family=Inter:400,500&family=Noto+Sans+SC:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f4; font-family: 'Inter', 'Noto Sans SC', sans-serif; padding: 40px 20px; }
  h2 { text-align: center; font-size: 18px; margin-bottom: 32px; color: #1c1917; }
  .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1100px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #e7e5e4; border-radius: 10px; overflow: hidden; }
  .card-header { padding: 14px 20px; border-bottom: 1px solid #e7e5e4; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; }
  .card-header span { color: #78716c; font-weight: 400; font-size: 11px; }
  .card-body { padding: 0; }
  iframe { width: 100%; height: 260px; border: none; }

  @media (max-width: 900px) { .gallery { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h2>代码块风格 · 个人信息卡片</h2>

<div class="gallery">
  <div class="card">
    <div class="card-header">A · VS Code Dark <span>编辑器暗色风格</span></div>
    <div class="card-body"><iframe src="code-block-a-vscode.html"></iframe></div>
  </div>
  <div class="card">
    <div class="card-header">B · Terminal Light <span>终端亮色风格</span></div>
    <div class="card-body"><iframe src="code-block-b-terminal.html"></iframe></div>
  </div>
  <div class="card">
    <div class="card-header">C · JSON Config <span>配置文件风格</span></div>
    <div class="card-body"><iframe src="code-block-c-json.html"></iframe></div>
  </div>
  <div class="card">
    <div class="card-header">D · Commented Code <span>注释+变量风格</span></div>
    <div class="card-body"><iframe src="code-block-d-comment.html"></iframe></div>
  </div>
</div>

</body>
</html>
